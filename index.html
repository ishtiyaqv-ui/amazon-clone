<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Clone - CI/CD Demo</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #232F3E;
            color: white;
            text-align: center;
        }

        header {
            background: #131A22;
            padding: 20px;
        }

        h1 {
            color: #FF9900;
        }

        .container {
            margin-top: 60px;
        }

        .card {
            width: 500px;
            margin: auto;
            background: white;
            color: black;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0px 0px 15px gray;
        }

        .success {
            color: green;
            font-size: 24px;
            font-weight: bold;
        }

        .version {
            color: red;
            font-size: 22px;
            margin-top: 20px;
        }

        footer {
            margin-top: 60px;
            padding: 20px;
            background: #131A22;
        }
    </style>
</head>
<body>

<header>
    <h1>Amazon Clone</h1>
</header>

<div class="container">

    <div class="card">

        <h2>🚀 Azure DevOps CI/CD Successful</h2>

        <p class="success">
            Website deployed automatically using Azure DevOps Pipeline
        </p>

        <p>
            Linux → Git → GitHub → Azure DevOps → Azure VM → Nginx
        </p>

        <div class="version">
            Version 2.0
        </div>

        <br>

        <p>
            Deployment Date:
            <strong>17 July 2026</strong>
        </p>

    </div>

</div>

<footer>

    DevOps Practice Project

</footer>

</body>
</html>
