<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEasy</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>

<h1>ShopEasy</h1>

<input type="text" placeholder="Search products...">

<button>Search</button>

</header>

<nav>

<a href="#">Home</a>

<a href="#">Mobiles</a>

<a href="#">Electronics</a>

<a href="#">Fashion</a>

<a href="#">Contact</a>

</nav>

<section class="products">

    <div class="card">
        <img src="images/iphone.jpg" alt="iPhone">
        <h2>iPhone 16</h2>
        <p>₹1,20,000</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="images/laptop.jpg" alt="Laptop">
        <h2>Gaming Laptop</h2>
        <p>₹75,000</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="images/headphon.jpg" alt="Headphon">
        <h2>Headphones</h2>
        <p>₹3,999</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="images/watch.jpg" alt="Watch">
        <h2>Smart Watch</h2>
        <p>₹5,999</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="images/shoes.jpg" alt="Shoes">
        <h2>Sports Shoes</h2>
        <p>₹2,499</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="images/speaker.jpg" alt="Speaker">
        <h2>Bluetooth Speaker</h2>
        <p>₹1,999</p>
        <button>Add to Cart</button>
    </div>

</section>

<footer>

<p>© 2026 ShopEasy</p>

</footer>

<script src="js/script.js"></script>

</body>

</html>
